# ~/.config/alacritty/alacritty.toml

general.import = ["~/.config/alacritty/catppuccin/catppuccin-frappe.toml"]

[env]
TERM = "xterm-256color"

[window]
dimensions = { columns = 100, lines = 30 }
padding = { x = 10, y = 0 }
decorations = "full"
opacity = 0.95

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
size = 14.0

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#cdd6f4"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true  # Enables copy-to-clipboard on selection

[mouse]
hide_when_typing = true

[terminal]
osc52 = "OnlyCopy"  # Enables OSC 52 clipboard integration with tmux

[keyboard]
bindings = [
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" }
]
